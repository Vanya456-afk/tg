name: Build APK & Send to Telegram
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: 'stable'

      - name: Build Clean Project
        run: |
          cp lib/main.dart /tmp/saved_main.dart
          rm -rf *
          flutter create --platforms=android .
          cp /tmp/saved_main.dart lib/main.dart
          flutter pub get
          flutter build apk --release

      - name: Send APK to Telegram
        run: |
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -F document=@"build/app/outputs/flutter-apk/app-release.apk" \
               -F caption="Твоё Brawl-приложение готово! 🚀 Нажимай и устанавливай." \
               https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument
