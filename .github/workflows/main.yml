name: Build
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2.16.0
        with:
          channel: 'stable'
      - run: flutter pub get
      - run: flutter build apk --release
      - run: |
          curl -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" -F document=@"build/app/outputs/flutter-apk/app-release.apk" -F caption="Готово! 🚀" https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument
